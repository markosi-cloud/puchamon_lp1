<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Puchamon Rojo</title>
 <link rel="stylesheet" href="class.css">
</head>
<body tabindex="0">

<div class="gameboy-screen">
  <div class="screen-inner">

<img class="title-logo" 
     src="assets/images/logo.png" 
     alt="Pokémon Rojo Logo">

<div class="trainer" 
     style="background-image: url('assets/images/red-trainer.png');">
</div>

    <div class="pokemon-container" id="pokemonContainer">
      <div class="pokemon" id="pokemonSprite"></div>
    </div>

    <div class="press-start">PRESS START</div>

  </div>
</div>

<audio id="titleMusic" loop preload="auto" autoplay>
<source src="assets/audios/title-theme.mp3" type="audio/mpeg">
</audio>

<script src="app.js"></script>

</body>
</html>
